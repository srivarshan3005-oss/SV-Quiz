<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SV Quiz{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <a href="{{ url_for('dashboard') }}" class="nav__brand">SV <span>Quiz</span></a>

  <div class="nav__links">
    <a href="{{ url_for('dashboard') }}"
       class="nav__link {{ 'nav__link--active' if request.endpoint == 'dashboard' }}">
      Dashboard
    </a>
    <a href="{{ url_for('leaderboard') }}"
       class="nav__link {{ 'nav__link--active' if request.endpoint == 'leaderboard' }}">
      Leaderboard
    </a>
  </div>

  <div class="nav__right">
    {% if session.user %}
    <div class="nav__avatar">{{ session.user.name[0]|upper }}</div>
    <span class="nav__user">{{ session.user.name }}</span>
    {% endif %}
    <a href="{{ url_for('logout') }}" class="nav__logout">Sign out</a>
  </div>
</nav>

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}

</body>
</html>
